server:
  port: 8080
  tomcat:
    uri-encoding: utf-8
  max-http-header-size: 1MB
spring:
  profiles:
    active: dev
  datasource:
    druid:
      # ===== 核心稳定性配置（必须）=====
      initial-size: 0          # 启动时不强制创建连接
      fail-fast: false         # 数据库未就绪不让应用启动失败
      # ===== 连接池大小 =====
      min-idle: 3
      max-active: 20
      max-wait: 10000
      # ===== 连接检测 =====
      validation-query: SELECT 1
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true
      # ===== 空闲连接回收 =====
      time-between-eviction-runs-millis: 10000
      min-evictable-idle-time-millis: 50000
      # ===== SQL 防火墙 & 监控 =====
      filters: stat,wall,slf4j
  thymeleaf:
    cache: false
    mode: HTML
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  data:
    redis:
      repositories:
        enabled: false
  aop:
    proxy-target-class: true
  servlet:
    #上传文件大小限制全局：服务器文件管理支持上传压缩包，SERVER_FILE 策略上限 500MB，
    #这里必须不小于该值，否则大文件会在到达业务代码前就被框架直接拒绝
    multipart:
      max-file-size: 550MB
      max-request-size: 550MB
mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.thx.model

#  日志配置
logging:
  file:
    path: logs
