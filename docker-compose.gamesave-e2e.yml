services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: cms
      MYSQL_ROOT_PASSWORD: gamesave-e2e-root
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - ./docs/db/cms.sql:/docker-entrypoint-initdb.d/01-cms.sql:ro
      - ./docs/db/file_system.sql:/docker-entrypoint-initdb.d/02-file-system.sql:ro
      - ./docs/db/game_save.sql:/docker-entrypoint-initdb.d/03-game-save.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -pgamesave-e2e-root --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:6-alpine
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: gamesave-e2e-minio
      MINIO_ROOT_PASSWORD: gamesave-e2e-minio-secret
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data

  cms:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cms?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: gamesave-e2e-root
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: gamesave-e2e-minio
      MINIO_SECRET_KEY: gamesave-e2e-minio-secret
      MINIO_PUBLIC_DOMAIN: http://localhost:19000
      MAIL_PASSWORD: gamesave-e2e-unused
      AGENT_API_KEY: gamesave-e2e-unused
    ports:
      - "18080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

volumes:
  minio-data: