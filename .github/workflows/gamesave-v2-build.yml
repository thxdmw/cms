name: GameSave V2 后端构建

on:
  pull_request:
    paths:
      - 'src/main/java/com/thx/module/gamesave/**'
      - 'src/main/java/com/thx/module/file/**'
      - 'src/main/java/com/thx/common/config/WebMvcConfig.java'
      - 'docs/db/game_save.sql'
      - 'pom.xml'
      - '.github/workflows/gamesave-v2-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: JDK 8 Maven 构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'maven'

      - name: 执行测试
        shell: bash
        run: |
          set -o pipefail
          mvn -B test 2>&1 | tee maven-test.log

      - name: 打包验证
        shell: bash
        run: |
          set -o pipefail
          mvn -B -DskipTests package 2>&1 | tee maven-package.log

      - name: 上传 Maven 构建日志
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gamesave-v2-maven-logs
          path: |
            maven-test.log
            maven-package.log
          if-no-files-found: warn
          retention-days: 7
