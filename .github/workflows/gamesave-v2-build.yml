name: GameSave V2 后端构建

on:
  pull_request:
    paths:
      - 'src/main/java/com/thx/module/gamesave/**'
      - 'src/main/java/com/thx/module/file/**'
      - 'src/main/java/com/thx/common/config/WebMvcConfig.java'
      - 'docs/db/game_save.sql'
      - 'pom.xml'
      - '.github/workflows/gamesave-v2-build.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: JDK 8 Maven 构建
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 JDK 8
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '8'
          cache: 'maven'

      - name: 执行测试
        run: mvn -B test

      - name: 打包验证
        run: mvn -B -DskipTests package
