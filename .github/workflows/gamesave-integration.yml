name: GameSave 集成验证

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/main/java/com/thx/module/gamesave/**'
      - 'src/main/resources/db/migration/**'
      - 'src/test/java/com/thx/module/gamesave/**'
      - '.github/workflows/gamesave-integration.yml'

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cms
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=10
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: gamesave
          MINIO_ROOT_PASSWORD: gamesave-secret
        ports: ['9000:9000']
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live"
          --health-interval=10s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
      - name: 迁移与 GameSave 集成测试
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/cms?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_REDIS_HOST: 127.0.0.1
          SPRING_REDIS_PORT: 6379
        run: mvn -B -Dgamesave.integration=true test
